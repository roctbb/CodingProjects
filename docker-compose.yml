x-app-environment: &app-environment
  APP_ENV: ${APP_ENV:-production}
  APP_DEBUG: ${APP_DEBUG:-false}
  APP_URL: ${APP_URL:-http://localhost:8050}
  DB_CONNECTION: ${DB_CONNECTION:-pgsql}
  DB_HOST: ${DB_HOST:-db}
  DB_PORT: ${DB_PORT:-5432}
  DB_DATABASE: ${DB_DATABASE:-codingprojects}
  DB_USERNAME: ${DB_USERNAME:-codingprojects}
  DB_PASSWORD: ${DB_PASSWORD:-codingprojects}
  CACHE_DRIVER: ${CACHE_DRIVER:-redis}
  SESSION_DRIVER: ${SESSION_DRIVER:-redis}
  QUEUE_CONNECTION: ${QUEUE_CONNECTION:-redis}
  REDIS_HOST: ${REDIS_HOST:-redis}
  REDIS_PORT: ${REDIS_PORT:-6379}
  REDIS_CLIENT: ${REDIS_CLIENT:-phpredis}

x-app-healthcheck: &app-healthcheck
  test: ["CMD-SHELL", "php artisan about --only=environment >/dev/null 2>&1"]
  interval: 30s
  timeout: 10s
  retries: 3
  start_period: 60s

services:
  php:
    build:
      context: .
      dockerfile: conf/Dockerfile
    container_name: codingprojects-php
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    env_file:
      - .env
    environment:
      <<: *app-environment
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck: *app-healthcheck
    volumes:
      - ./:/var/www/html
    networks:
      - app

  nginx:
    image: nginx:1.27-alpine
    container_name: codingprojects-nginx
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    depends_on:
      php:
        condition: service_healthy
    ports:
      - "127.0.0.1:1111:8050"
    volumes:
      - ./:/var/www/html:ro
      - ./conf/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    healthcheck:
      test: ["CMD-SHELL", "wget --quiet --tries=1 --spider http://127.0.0.1:8050 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    networks:
      - app

  queue:
    build:
      context: .
      dockerfile: conf/Dockerfile
    container_name: codingprojects-queue
    restart: unless-stopped
    command: php artisan queue:work --sleep=3 --tries=3 --timeout=90
    env_file:
      - .env
    environment:
      <<: *app-environment
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck: *app-healthcheck
    volumes:
      - ./:/var/www/html
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - app

  scheduler:
    build:
      context: .
      dockerfile: conf/Dockerfile
    container_name: codingprojects-scheduler
    restart: unless-stopped
    command: php artisan schedule:work
    env_file:
      - .env
    environment:
      <<: *app-environment
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck: *app-healthcheck
    volumes:
      - ./:/var/www/html
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - app

  db:
    image: postgres:16-alpine
    container_name: codingprojects-db
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    environment:
      POSTGRES_DB: ${DB_DATABASE:-codingprojects}
      POSTGRES_USER: ${DB_USERNAME:-codingprojects}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-codingprojects}
    ports:
      - "5435:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - app

  redis:
    image: redis:7-alpine
    container_name: codingprojects-redis
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - app

volumes:
  db_data:
  redis_data:

networks:
  app:
    driver: bridge
